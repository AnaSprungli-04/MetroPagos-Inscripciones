<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page_title }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<header class="py-4 mt-2">
  <div class="container d-flex flex-column flex-lg-row align-items-center justify-content-center text-center text-lg-start">
    <div class="text-center order-1 order-lg-2 mb-3 mb-lg-0">
      <img src="/{{ logo_path }}" alt="Logo" class="img-fluid mb-2" style="width: 100px;">
      <h1 class="mb-0">{{ title_main }} <strong>{{ title_strong }}</strong></h1>
    </div>
    <a href="{{ url_for('admin_home') }}" class="btn btn-outline-secondary btn-sm position-absolute top-0 end-0 m-3">
      <i class="bi bi-gear"></i> Admin
    </a>
  </div>
  {% if multiple_campeonatos %}
  <div class="text-center mt-2">
    <a href="{{ url_for('inscripciones') }}" class="btn btn-link btn-sm text-muted">
      <i class="bi bi-arrow-left"></i> Otros campeonatos
    </a>
  </div>
  {% endif %}
</header>

<div class="container my-2">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-lg p-4 mb-5 bg-body-tertiary rounded">
        <div class="card-body">
          <form id="inscriptionForm" action="{{ url_for('process_inscription') }}" method="POST">

            <input type="hidden" name="camp_id" value="{{ camp_id }}">

            <div class="mb-4 align-items-center text-center">
              <label class="form-label d-block mb-2 fs-2">Cual es tu rol?</label>
              <div class="row-gap-3">
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="rol" id="rolEntrenador" value="entrenador" required>
                  <label class="form-check-label" for="rolEntrenador">Entrenador</label>
                </div>
                <div class="form-check form-check-inline mt-3">
                  <input class="form-check-input" type="radio" name="rol" id="rolCompetidor" value="competidor" required>
                  <label class="form-check-label" for="rolCompetidor">Competidor</label>
                </div>
              </div>
            </div>

            <div id="competidorFields" style="display: none;">
              <div id="claseBarcoGroup" class="mb-2">
                <label for="claseBarco" class="form-label">Clase de Barco:</label>
                <select class="form-select" id="claseBarco" name="clase_barco">
                  <option value="">Selecciona tu clase de barco</option>
                  {% for cls in classes %}
                    {% if cls.closed %}
                      <option value="{{ cls.name }}" class="disabled-option" disabled><s>{{ cls.name }}</s> - clase cerrada</option>
                    {% else %}
                      <option value="{{ cls.name }}">{{ cls.name }}</option>
                    {% endif %}
                  {% endfor %}
                </select>
              </div>
              {% if discount_enabled and discount_description %}
              <div class="mb-4 form-check">
                <input type="checkbox" class="form-check-input" id="apply_discount" name="apply_discount">
                <label class="form-check-label" for="apply_discount">{{ discount_description }}</label>
              </div>
              {% endif %}
            </div>

            <hr class="my-4">
            <div class="text-center">
              <button type="submit" class="btn btn-primary btn-lg mt-3">
                <i class="bi bi-arrow-right-circle-fill me-2"></i> Continuar Inscripcion
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const inscriptionForm = document.getElementById('inscriptionForm');
    const rolEntrenador = document.getElementById('rolEntrenador');
    const rolCompetidor = document.getElementById('rolCompetidor');
    const competidorFields = document.getElementById('competidorFields');
    const claseBarcoSelect = document.getElementById('claseBarco');

    function toggleCompetidorFields() {
      if (rolCompetidor.checked) {
        competidorFields.style.display = 'block';
        claseBarcoSelect.setAttribute('required', 'required');
      } else {
        competidorFields.style.display = 'none';
        claseBarcoSelect.removeAttribute('required');
        claseBarcoSelect.value = '';
      }
    }

    rolEntrenador.addEventListener('change', toggleCompetidorFields);
    rolCompetidor.addEventListener('change', toggleCompetidorFields);
    toggleCompetidorFields();

    var clasesHabilitadas = {{ enabled_classes|tojson|safe }};

    claseBarcoSelect.addEventListener('change', function() {
      var selectedClass = claseBarcoSelect.value;
      if (rolCompetidor.checked && selectedClass !== '' && !clasesHabilitadas.includes(selectedClass)) {
        alert('La inscripcion para esta clase esta cerrada.');
        claseBarcoSelect.value = '';
      }
    });

    inscriptionForm.addEventListener('submit', function(event) {
      var selectedClass = claseBarcoSelect.value;
      if (rolCompetidor.checked && !clasesHabilitadas.includes(selectedClass)) {
        event.preventDefault();
        alert('La inscripcion para esta clase esta cerrada. Por favor, selecciona una clase habilitada.');
      }
    });
  });
</script>
</body>
</html>
